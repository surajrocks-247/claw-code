<svg xmlns="http://www.w3.org/2000/svg" width="820" height="620" font-family="'SF Mono','Cascadia Code','Fira Code','Menlo','Consolas',monospace" font-size="13">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .btn-close { fill: #f38ba8; }
      .btn-min { fill: #fab387; }
      .btn-max { fill: #a6e3a1; }
      .title { fill: #cdd6f4; font-size: 12px; }
      .prompt { fill: #89b4fa; }
      .cmd { fill: #cdd6f4; }
      .dim { fill: #6c7086; }
      .green { fill: #a6e3a1; }
      .yellow { fill: #f9e2af; }
      .cyan { fill: #89dceb; }
      .mauve { fill: #cba6f7; }
      .text { fill: #bac2de; }
      .bold { fill: #cdd6f4; font-weight: bold; }
    </style>
  </defs>
  <rect class="bg" width="820" height="620" rx="10"/>
  <rect class="titlebar" width="820" height="36" rx="10"/>
  <rect class="titlebar" y="20" width="820" height="16"/>
  <circle class="btn-close" cx="20" cy="18" r="6"/>
  <circle class="btn-min" cx="40" cy="18" r="6"/>
  <circle class="btn-max" cx="60" cy="18" r="6"/>
  <text class="title" x="410" y="22" text-anchor="middle">claw — --help</text>

  <text class="prompt" x="16" y="60">❯</text>
  <text class="cmd" x="30" y="60">claw --help</text>

  <text class="bold" x="16" y="86">claw v0.1.0</text>

  <text class="text" x="16" y="110">Usage:</text>
  <text class="cyan" x="16" y="130">  claw</text>
  <text class="dim" x="60" y="130">[--model MODEL] [--allowedTools TOOL[,TOOL...]]</text>
  <text class="dim" x="16" y="148">      Start the interactive REPL</text>
  <text class="cyan" x="16" y="168">  claw</text>
  <text class="dim" x="60" y="168">[--model MODEL] [--output-format text|json]</text>
  <text class="green" x="16" y="186">       prompt</text>
  <text class="yellow" x="95" y="186">TEXT</text>
  <text class="dim" x="16" y="204">      Send one prompt and exit</text>
  <text class="cyan" x="16" y="224">  claw</text>
  <text class="green" x="60" y="224">--resume</text>
  <text class="dim" x="145" y="224">[SESSION.jsonl|session-id|latest] [/status] [...]</text>
  <text class="dim" x="16" y="242">      Inspect or maintain a saved session</text>

  <text class="text" x="16" y="270">Top-level commands:</text>
  <text class="green" x="30" y="290">prompt</text>
  <text class="dim" x="130" y="290">Send one prompt and exit</text>
  <text class="green" x="30" y="308">doctor</text>
  <text class="dim" x="130" y="308">Diagnose auth, config, workspace health</text>
  <text class="green" x="30" y="326">status</text>
  <text class="dim" x="130" y="326">Show workspace status snapshot</text>
  <text class="green" x="30" y="344">init</text>
  <text class="dim" x="130" y="344">Create starter .claw config + CLAUDE.md</text>
  <text class="green" x="30" y="362">export</text>
  <text class="dim" x="130" y="362">Dump session as markdown</text>
  <text class="green" x="30" y="380">agents</text>
  <text class="dim" x="130" y="380">List configured agents</text>
  <text class="green" x="30" y="398">mcp</text>
  <text class="dim" x="130" y="398">Inspect MCP servers</text>
  <text class="green" x="30" y="416">skills</text>
  <text class="dim" x="130" y="416">List available skills</text>
  <text class="green" x="30" y="434">sandbox</text>
  <text class="dim" x="130" y="434">Show sandbox isolation snapshot</text>

  <text class="text" x="16" y="462">Flags:</text>
  <text class="mauve" x="30" y="482">--model</text>
  <text class="yellow" x="110" y="482">MODEL</text>
  <text class="dim" x="230" y="482">Override the active model</text>
  <text class="mauve" x="30" y="500">--output-format</text>
  <text class="yellow" x="160" y="500">FORMAT</text>
  <text class="dim" x="230" y="500">text or json</text>
  <text class="mauve" x="30" y="518">--permission-mode</text>
  <text class="yellow" x="180" y="518">MODE</text>
  <text class="dim" x="230" y="518">read-only | workspace-write | danger-full-access</text>
  <text class="mauve" x="30" y="536">--allowedTools</text>
  <text class="yellow" x="160" y="536">TOOLS</text>
  <text class="dim" x="230" y="536">Restrict enabled tools</text>
  <text class="mauve" x="30" y="554">--resume</text>
  <text class="dim" x="230" y="554">Resume a saved session</text>
  <text class="mauve" x="30" y="572">--version, -V</text>
  <text class="dim" x="230" y="572">Print version and build info</text>

  <text class="dim" x="16" y="604">source of truth: https://github.com/ultraworkers/claw-code</text>
</svg>
