<svg xmlns="http://www.w3.org/2000/svg" width="820" height="480" font-family="'SF Mono','Cascadia Code','Fira Code','Menlo','Consolas',monospace" font-size="13">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .btn-close { fill: #f38ba8; }
      .btn-min { fill: #fab387; }
      .btn-max { fill: #a6e3a1; }
      .title { fill: #cdd6f4; font-size: 12px; }
      .prompt { fill: #89b4fa; }
      .cmd { fill: #cdd6f4; }
      .dim { fill: #6c7086; }
      .green { fill: #a6e3a1; }
      .yellow { fill: #f9e2af; }
      .cyan { fill: #89dceb; }
      .text { fill: #bac2de; }
      .bold { fill: #cdd6f4; font-weight: bold; }
      .slash { fill: #f5c2e7; }
      .category { fill: #cba6f7; font-weight: bold; font-size: 12px; }
    </style>
  </defs>
  <rect class="bg" width="820" height="480" rx="10"/>
  <rect class="titlebar" width="820" height="36" rx="10"/>
  <rect class="titlebar" y="20" width="820" height="16"/>
  <circle class="btn-close" cx="20" cy="18" r="6"/>
  <circle class="btn-min" cx="40" cy="18" r="6"/>
  <circle class="btn-max" cx="60" cy="18" r="6"/>
  <text class="title" x="410" y="22" text-anchor="middle">claw — interactive REPL</text>

  <text class="prompt" x="16" y="58">❯</text>
  <text class="slash" x="30" y="58">/help</text>

  <text class="category" x="16" y="84">Session</text>
  <text class="slash" x="30" y="102">/status</text>
  <text class="dim" x="180" y="102">Show current session status</text>
  <text class="slash" x="30" y="120">/cost</text>
  <text class="dim" x="180" y="120">Show cumulative token usage</text>
  <text class="slash" x="30" y="138">/resume</text>
  <text class="dim" x="180" y="138">Load a saved session into the REPL</text>
  <text class="slash" x="30" y="156">/session</text>
  <text class="dim" x="180" y="156">List, switch, fork, or delete sessions</text>
  <text class="slash" x="30" y="174">/compact</text>
  <text class="dim" x="180" y="174">Compact local session history</text>

  <text class="category" x="16" y="202">Tools</text>
  <text class="slash" x="30" y="220">/diff</text>
  <text class="dim" x="180" y="220">Show git diff for workspace changes</text>
  <text class="slash" x="30" y="238">/commit</text>
  <text class="dim" x="180" y="238">Generate a commit message and create a git commit</text>
  <text class="slash" x="30" y="256">/ultraplan</text>
  <text class="dim" x="180" y="256">Deep planning with multi-step reasoning</text>
  <text class="slash" x="30" y="274">/bughunter</text>
  <text class="dim" x="180" y="274">Inspect codebase for likely bugs</text>
  <text class="slash" x="30" y="292">/teleport</text>
  <text class="dim" x="180" y="292">Jump to a file or symbol</text>
  <text class="slash" x="30" y="310">/agents</text>
  <text class="dim" x="180" y="310">List configured agents</text>
  <text class="slash" x="30" y="328">/skills</text>
  <text class="dim" x="180" y="328">List, install, or invoke available skills</text>
  <text class="slash" x="30" y="346">/mcp</text>
  <text class="dim" x="180" y="346">Inspect configured MCP servers</text>
  <text class="slash" x="30" y="364">/plugin</text>
  <text class="dim" x="180" y="364">Manage Claw Code plugins</text>

  <text class="category" x="16" y="392">Config</text>
  <text class="slash" x="30" y="410">/model</text>
  <text class="dim" x="180" y="410">Show or switch the active model</text>
  <text class="slash" x="30" y="428">/permissions</text>
  <text class="dim" x="180" y="428">Show or switch the active permission mode</text>

  <text class="category" x="16" y="456">Debug</text>
  <text class="slash" x="30" y="456">/doctor</text>
  <text class="dim" x="180" y="456">Diagnose setup issues and environment health</text>
</svg>
